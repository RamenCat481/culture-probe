<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位文化探針日誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); }
        .no-select { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        .required-tag { font-size: 9px; color: #94a3b8; font-weight: bold; border: 1px solid #f1f5f9; padding: 1px 4px; border-radius: 4px; }
        .tips-btn { font-size: 10px; color: #3b82f6; background: #eff6ff; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        @keyframes bounce-in { 0% { transform: scale(0.9); opacity: 0; } 70% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
        .animate-bounce-in { animation: bounce-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 no-select font-sans">
    <div id="app" class="max-w-md mx-auto min-h-screen p-6 pb-24">
        
        <div v-if="!user" class="flex flex-col items-center justify-center h-[80vh] text-center">
            <div class="bg-white p-10 rounded-[2.5rem] card-shadow border border-slate-100">
                <div class="text-5xl mb-6">🛰️</div>
                <h1 class="text-3xl font-black mb-2 tracking-tight">數位探針日誌</h1>
                <p class="text-slate-400 mb-10 text-sm">請使用 Google 帳號開始 7 日任務</p>
                <button @click="login" class="w-full bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">進入系統</button>
            </div>
        </div>

        <div v-else>
            <header class="flex justify-between items-start mb-8">
                <div>
                    <h2 @mousedown="startLongPress" @mouseup="endLongPress" @touchstart="startLongPress" @touchend="endLongPress" class="text-2xl font-black text-slate-900 leading-none mb-2">{{ user.displayName }}</h2>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Taipei Time</span>
                        <span class="text-[10px] font-black text-blue-500">{{ currentTime }}</span>
                    </div>
                </div>
                <div class="text-right">
                    <span class="inline-block bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase">Day {{ currentDayNumber }}</span>
                </div>
            </header>

            <main v-if="loadingProgress" class="flex flex-col items-center justify-center py-20">
                <div class="animate-spin text-3xl mb-4">⌛</div>
                <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">同步研究進度中...</p>
            </main>

            <main v-else class="space-y-6">
                <section class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-50">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="font-black text-slate-800 text-sm">☁️ 任務一：天空捕手</h3>
                        <span class="required-tag">必填</span>
                    </div>
                    <div class="grid grid-cols-3 gap-2 mt-4">
                        <div v-for="(img, idx) in skyPhotos" :key="idx" class="relative aspect-square">
                            <img :src="img" class="w-full h-full object-cover rounded-xl">
                            <button @click="skyPhotos.splice(idx, 1)" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-5 h-5 text-xs">×</button>
                        </div>
                        <div class="relative aspect-square border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center bg-slate-50">
                            <input type="file" accept="image/*" multiple @change="handleSkyPhotos" class="absolute inset-0 opacity-0">
                            <span class="text-2xl text-slate-300">+</span>
                        </div>
                    </div>
                </section>

                <section class="bg-blue-600 p-8 rounded-[2.5rem] shadow-2xl text-white">
                    <h3 class="font-black text-sm uppercase opacity-80 mb-6">Mission Control</h3>
                    <p class="text-xs mb-4 opacity-70">每日任務：{{ currentQuestion }}</p>
                    <textarea v-model="answers.dailyQuestion" class="w-full rounded-2xl p-4 text-sm bg-white/10 mb-4 outline-none" rows="3" placeholder="回答提問..."></textarea>
                    <textarea v-model="answers.diary" class="w-full rounded-2xl p-4 text-sm bg-white/10 outline-none" rows="3" placeholder="今日筆記..."></textarea>
                    
                    <button @click="submitAll" :disabled="uploading || !isFormValid" class="mt-8 w-full bg-white text-blue-600 py-4 rounded-2xl font-black shadow-xl active:scale-95 disabled:opacity-50">
                        {{ uploading ? '同步中...' : '提交紀錄' }}
                    </button>
                </section>
            </main>

            <transition name="fade">
                <div v-if="showSuccessCard" class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
                    <div class="bg-white w-full max-w-sm rounded-[3rem] overflow-hidden card-shadow animate-bounce-in">
                        <img :src="`image/${successImage}.png`" class="w-full h-64 object-cover">
                        <div class="p-8 text-center">
                            <h3 class="text-2xl font-black text-slate-900 mb-2">太棒了！</h3>
                            <p class="text-slate-500 text-sm mb-8">Day {{ currentDayNumber }} 紀錄完成。<br>辛苦了，請好好休息。</p>
                            <button @click="closeSuccessCard" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black">返回</button>
                        </div>
                    </div>
                </div>
            </transition>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDocs, collection, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMHC3xDC0dDXdw8i31v-TT3wUvoddXQgs",
      authDomain: "culture-probe-toolkit.firebaseapp.com",
      projectId: "culture-probe-toolkit",
      storageBucket: "culture-probe-toolkit.firebasestorage.app",
      messagingSenderId: "918153683622",
      appId: "1:918153683622:web:18398290da83ff9db30a67"
    };

    const GAS_URL = "https://script.google.com/macros/s/AKfycbzUREIji3lF-3500FlcYJLbuawBeNAcSaQFaF3lbUbW4DKUJ8LTdH0xX21G2gVIXXEO3w/exec"; 

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const { createApp, ref: vueRef, computed, onMounted, watch } = Vue;

    createApp({
        setup() {
            const user = vueRef(null);
            const uploading = vueRef(false);
            const loadingProgress = vueRef(false);
            const dbDayNumber = vueRef(1); // 從資料庫同步回來的進度
            const skyPhotos = vueRef([]);
            const lifePhotos = vueRef([]);
            const answers = vueRef({ dailyQuestion: "", diary: "" });
            const showSettings = vueRef(false);
            const showSuccessCard = vueRef(false);
            const successImage = vueRef("01");
            const currentTime = vueRef("");
            const pressTimer = vueRef(null);

            // 1. 熱更新核心：登入後自動同步資料庫進度
            watch(user, async (newVal) => {
                if (newVal) {
                    loadingProgress.value = true;
                    try {
                        const q = query(
                            collection(db, "probes", newVal.displayName, "daily_logs"),
                            orderBy("dayNumber", "desc"),
                            limit(1)
                        );
                        const querySnapshot = await getDocs(q);
                        if (!querySnapshot.empty) {
                            const lastDay = querySnapshot.docs[0].data().dayNumber;
                            // 如果今天已經填過 Day X，則顯示 Day X+1
                            dbDayNumber.value = lastDay + 1;
                        }
                    } catch (e) { console.error("Sync error:", e); }
                    loadingProgress.value = false;
                }
            });

            const currentDayNumber = computed(() => {
                // 如果手動調整過 (實驗室模式)，以手動優先；否則以資料庫同步的進度為主
                const offset = parseInt(localStorage.getItem('exp_offset')) || 0;
                let day = dbDayNumber.value + offset;
                return day > 7 ? 7 : day;
            });

            const isFormValid = computed(() => skyPhotos.value.length > 0 && lifePhotos.value.length > 0 && answers.value.dailyQuestion.trim() !== "" && answers.value.diary.trim() !== "");

            const questions = [
                "一個月會出國多少次？去多少種不同的國家？",
                "長期的不規律排班和跨時區時差，對日常帶來了哪些改變？通常如何調適？",
                "客艙工作環境中真的有階級文化嗎？有哪些新人必懂的潛規則？",
                "這份工作最無可取代的優點與最難以忍受的缺點分別為何？",
                "在與不同國籍的組員共事時，是否有特別的規定或不成文的默契需要遵守？",
                "經常需要在節假日排班或長期待在外站，這對維繫家庭關係、社交圈造成了什麼影響？",
                "隨意問答：今天有什麼特別想紀錄的事情嗎？"
            ];
            const currentQuestion = computed(() => questions[currentDayNumber.value - 1]);

            // 圖片邏輯修正為 PNG
            const getUnusedRandomImage = () => {
                let used = JSON.parse(localStorage.getItem('used_images')) || [];
                let available = Array.from({length: 21}, (_, i) => (i + 1).toString().padStart(2, '0')).filter(img => !used.includes(img));
                if (available.length === 0) { used = []; available = Array.from({length: 21}, (_, i) => (i + 1).toString().padStart(2, '0')); }
                const chosen = available[Math.floor(Math.random() * available.length)];
                used.push(chosen);
                localStorage.setItem('used_images', JSON.stringify(used));
                return chosen;
            };

            const submitAll = async () => {
                if (!isFormValid.value) return;
                uploading.value = true;
                const dateLabel = new Date().toLocaleDateString('zh-TW').replace(/\//g, '-');
                try {
                    await fetch(GAS_URL, {
                        method: "POST", mode: "no-cors",
                        body: JSON.stringify({ userName: user.value.displayName, date: dateLabel, skyPhotos: skyPhotos.value, lifePhotos: lifePhotos.value })
                    });
                    await setDoc(doc(db, "probes", user.value.displayName, "daily_logs", `Day${currentDayNumber.value}_${dateLabel}`), {
                        dayNumber: currentDayNumber.value, date: dateLabel, question: currentQuestion.value,
                        answer: answers.value.dailyQuestion, diary: answers.value.diary,
                        userName: user.value.displayName, createdAt: serverTimestamp()
                    });
                    
                    successImage.value = getUnusedRandomImage();
                    showSuccessCard.value = true;
                    dbDayNumber.value += 1; // 提交後進度自動+1
                    answers.value = { dailyQuestion: "", diary: "" };
                    skyPhotos.value = []; lifePhotos.value = [];
                } catch (e) { alert("同步失敗"); } finally { uploading.value = false; }
            };

            onMounted(() => {
                setInterval(() => {
                    const d = new Date();
                    const taipei = new Date(d.getTime() + (d.getTimezoneOffset() * 60000) + (8 * 3600000));
                    currentTime.value = taipei.toLocaleTimeString('zh-TW', { hour12: false });
                }, 1000);
            });

            onAuthStateChanged(auth, (u) => { user.value = u; });
            const login = () => signInWithPopup(auth, provider);
            const closeSuccessCard = () => { showSuccessCard.value = false; };
            const handleSkyPhotos = (e) => { Array.from(e.target.files).forEach(file => { const reader = new FileReader(); reader.onload = (f) => skyPhotos.value.push(f.target.result); reader.readAsDataURL(file); }); };
            const handleLifePhotos = (e) => { Array.from(e.target.files).forEach(file => { const reader = new FileReader(); reader.onload = (f) => lifePhotos.value.push(f.target.result); reader.readAsDataURL(file); }); };
            const startLongPress = () => pressTimer.value = setTimeout(() => showSettings.value = true, 3000);
            const endLongPress = () => clearTimeout(pressTimer.value);

            return { user, login, currentQuestion, currentDayNumber, answers, handleSkyPhotos, handleLifePhotos, skyPhotos, lifePhotos, uploading, submitAll, showSuccessCard, successImage, closeSuccessCard, currentTime, loadingProgress, startLongPress, endLongPress };
        }
    }).mount('#app');
</script>
</body>
</html>
