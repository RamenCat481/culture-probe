<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位文化探針包</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="app" class="max-w-md mx-auto min-h-screen p-4">
        
        <div v-if="!user" class="flex flex-col items-center justify-center h-screen">
            <h1 class="text-2xl font-bold mb-8">數位探針日誌</h1>
            <button @click="login" class="bg-blue-500 text-white px-6 py-2 rounded-full font-bold">
                使用 Google 帳號開始
            </button>
        </div>

        <div v-else>
            <header class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-lg font-bold">你好，{{ user.displayName || '參與者' }}</h2>
                    <p class="text-sm text-slate-500">今天是任務的第 {{ dayCount }} 天</p>
                </div>
                <button @click="logout" class="text-xs text-red-400">登出</button>
            </header>

            <main class="space-y-4">
                <section class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                    <h3 class="font-bold mb-2">☁️ 任務一：天空捕手 (必填)</h3>
                    <input type="file" accept="image/*" @change="uploadSkyPhoto" class="text-sm">
                    <p v-if="uploading" class="text-blue-500 text-xs mt-2">上傳中...</p>
                </section>

                <section class="bg-blue-100 p-4 rounded-2xl border-2 border-blue-200">
                    <h3 class="font-bold text-blue-800">💡 每日提問</h3>
                    <p class="my-3 text-sm font-medium">{{ currentQuestion }}</p>
                    <textarea v-model="answers.dailyQuestion" class="w-full rounded-lg p-2 text-sm" placeholder="輸入你的想法..."></textarea>
                    <button @click="submitAnswers" class="mt-2 bg-blue-600 text-white px-4 py-1 rounded-md text-sm">儲存今日回饋</button>
                </section>
            </main>
        </div>

    </div>

<script type="module">
    // 1. 這裡改用 CDN 載入，GitHub Pages 才能讀懂
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // 2. 這是你剛剛提供的配置資訊
    const firebaseConfig = {
      apiKey: "AIzaSyAMHC3xDC0dDXdw8i31v-TT3wUvoddXQgs",
      authDomain: "culture-probe-toolkit.firebaseapp.com",
      projectId: "culture-probe-toolkit",
      storageBucket: "culture-probe-toolkit.firebasestorage.app",
      messagingSenderId: "918153683622",
      appId: "1:918153683622:web:18398290da83ff9db30a67",
      measurementId: "G-7MRGH9KL8B"
    };

    // 3. 初始化 Firebase 模組
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore();
    const storage = getStorage();
    const provider = new GoogleAuthProvider();

    // 4. Vue 邏輯開始
    const { createApp, ref: vueRef, onMounted, computed } = Vue;

    createApp({
        setup() {
            const user = vueRef(null);
            const uploading = vueRef(false);
            const dayCount = vueRef(1); // 之後可以根據日期自動計算
            const answers = vueRef({ dailyQuestion: "", diary: "" });

            // 你的 7 天提問內容
            const questions = [
                "一個月會出國多少次？去多少種不同的國家？",
                "長期的不規律排班和跨時區時差，對日常帶來了哪些改變？通常如何調適？",
                "客艙工作環境中真的有階級文化嗎？有哪些新人必懂的潛規則？",
                "這份工作最無可取代的優點與最難以忍受的缺點分別為何？",
                "在與不同國籍的組員共事時，是否有特別的規定或不成文的默契需要遵守？",
                "經常需要在節假日排班或長期待在外站，這對維繫家庭關係、感情生活或社交圈，造成了什麼影響？",
                "隨意問答：今天有什麼特別想紀錄的事情嗎？"
            ];

            const currentQuestion = computed(() => questions[(dayCount.value - 1) % questions.length]);

            // 監聽登入狀態
            onAuthStateChanged(auth, (u) => {
                user.value = u;
                if (u) {
                    console.log("登入成功，歡迎 " + u.displayName);
                }
            });

            const login = () => signInWithPopup(auth, provider);
            const logout = () => signOut(auth);

            // 上傳照片到 Storage
            const uploadSkyPhoto = async (event) => {
                const file = event.target.files[0];
                if (!file || !user.value) return;

                uploading.value = true;
                try {
                    const storageRef = ref(storage, `sky_photos/${user.value.uid}/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    alert("天空照片已成功傳送！☁️");
                } catch (e) {
                    console.error(e);
                    alert("上傳失敗，請檢查 Firebase Storage 權限設定");
                } finally {
                    uploading.value = false;
                }
            };

            // 儲存文字內容到 Firestore
            const submitAnswers = async () => {
                if (!user.value) return;
                try {
                    const today = new Date().toLocaleDateString('zh-TW').replace(/\//g, '-');
                    await setDoc(doc(db, "responses", `${user.value.uid}_${today}`), {
                        userName: user.value.displayName,
                        date: today,
                        question: currentQuestion.value,
                        answer: answers.value.dailyQuestion,
                        timestamp: new Date()
                    });
                    alert("今日任務已儲存！感謝你的分享 ✨");
                } catch (e) {
                    console.error(e);
                    alert("儲存失敗，請檢查 Firebase Firestore 權限設定");
                }
            };

            return { 
                user, login, logout, dayCount, currentQuestion, 
                answers, uploadSkyPhoto, uploading, submitAnswers 
            };
        }
    }).mount('#app');
</script>
</body>
</html>
