<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位文化探針日誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.08); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800">
    <div id="app" class="max-w-md mx-auto min-h-screen p-6 pb-24">
        
        <div v-if="!user" class="flex flex-col items-center justify-center h-[80vh] text-center">
            <div class="bg-white p-10 rounded-[2.5rem] card-shadow border border-slate-100">
                <div class="text-5xl mb-6">🛰️</div>
                <h1 class="text-3xl font-black mb-2 tracking-tight">數位探針日誌</h1>
                <p class="text-slate-400 mb-10 text-sm">請使用 Google 帳號開始 7 日任務</p>
                <button @click="login" class="w-full bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                    進入系統
                </button>
            </div>
        </div>

        <div v-else>
            <header class="flex justify-between items-end mb-8">
                <div>
                    <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">Cultural Probe Project</p>
                    <h2 class="text-2xl font-black text-slate-900 leading-none">{{ user.displayName }}</h2>
                </div>
                <div class="flex items-center gap-3">
                    <button @click="showSettings = true" class="w-8 h-8 flex items-center justify-center bg-slate-100 rounded-full text-sm shadow-sm">⚙️</button>
                    <div class="text-right">
                        <span class="inline-block bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-[10px] font-black uppercase">
                            Mission Day {{ currentDayNumber }}
                        </span>
                    </div>
                </div>
            </header>

            <main class="space-y-6">
                <section class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-50">
                    <h3 class="font-black text-slate-800 mb-1 text-sm">☁️ 任務一：天空捕手 (必填)</h3>
                    <div class="grid grid-cols-3 gap-2 mt-4">
                        <div v-for="(img, idx) in skyPhotos" :key="idx" class="relative aspect-square">
                            <img :src="img" class="w-full h-full object-cover rounded-xl">
                            <button @click="skyPhotos.splice(idx, 1)" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center">×</button>
                        </div>
                        <div class="relative aspect-square border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center bg-slate-50 hover:bg-slate-100 transition-colors">
                            <input type="file" accept="image/*" multiple @change="handleSkyPhotos" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            <span class="text-2xl text-slate-300">+</span>
                        </div>
                    </div>
                </section>

                <section class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-50">
                    <h3 class="font-black text-slate-800 mb-1 text-sm">📸 任務二：生活碎片 (選填)</h3>
                    <div class="grid grid-cols-3 gap-2 mt-4">
                        <div v-for="(img, idx) in lifePhotos" :key="idx" class="relative aspect-square">
                            <img :src="img" class="w-full h-full object-cover rounded-xl">
                            <button @click="lifePhotos.splice(idx, 1)" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center">×</button>
                        </div>
                        <div class="relative aspect-square border-2 border-dashed border-slate-200 rounded-xl flex items-center justify-center bg-slate-50 hover:bg-slate-100 transition-colors">
                            <input type="file" accept="image/*" multiple @change="handleLifePhotos" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            <span class="text-2xl text-slate-300">+</span>
                        </div>
                    </div>
                </section>

                <section class="bg-blue-600 p-8 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
                    <div class="absolute -top-12 -right-12 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                    <p class="text-[10px] font-black opacity-60 mb-4 tracking-widest uppercase">Question</p>
                    <p class="text-lg font-bold leading-snug mb-8">{{ currentQuestion }}</p>
                    
                    <div class="space-y-6">
                        <textarea v-model="answers.dailyQuestion" class="w-full rounded-2xl p-4 text-sm bg-white/10 border border-white/20 text-white placeholder:text-white/30 focus:bg-white focus:text-slate-800 outline-none transition-all" rows="3" placeholder="您的看法..."></textarea>
                        <textarea v-model="answers.diary" class="w-full rounded-2xl p-4 text-sm bg-white/10 border border-white/20 text-white placeholder:text-white/30 focus:bg-white focus:text-slate-800 outline-none transition-all" rows="3" placeholder="今日小日記..."></textarea>
                    </div>
                    
                    <button @click="submitAll" :disabled="uploading || skyPhotos.length === 0" class="mt-8 w-full bg-white text-blue-600 py-4 rounded-2xl font-black shadow-xl active:scale-95 disabled:bg-blue-300 disabled:text-blue-100 transition-all">
                        {{ uploading ? '同步中...' : '提交紀錄' }}
                    </button>
                    <button @click="logout" class="w-full mt-4 text-[10px] text-blue-200 font-bold opacity-60">登出帳號</button>
                </section>
            </main>

            <div v-if="showSettings" class="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-6 backdrop-blur-sm">
                <div class="bg-white w-full max-w-xs rounded-[2.5rem] p-8 shadow-2xl">
                    <h3 class="font-black text-xl mb-2">實驗室控制台</h3>
                    <p class="text-[10px] text-slate-400 mb-6 font-medium text-center">測試時可在此手動調整天數</p>
                    <div class="grid grid-cols-4 gap-2 mb-8">
                        <button v-for="d in 7" @click="setDay(d)" class="py-3 rounded-xl text-xs font-black transition-all" :class="currentDayNumber === d ? 'bg-blue-600 text-white' : 'bg-slate-100 text-slate-400'">
                            D{{ d }}
                        </button>
                    </div>
                    <button @click="resetExperiment" class="w-full py-4 bg-red-50 text-red-500 rounded-2xl font-black text-sm mb-3">重製所有實驗狀態</button>
                    <button @click="showSettings = false" class="w-full py-2 text-slate-400 text-xs font-bold">返回任務</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMHC3xDC0dDXdw8i31v-TT3wUvoddXQgs",
      authDomain: "culture-probe-toolkit.firebaseapp.com",
      projectId: "culture-probe-toolkit",
      storageBucket: "culture-probe-toolkit.firebasestorage.app",
      messagingSenderId: "918153683622",
      appId: "1:918153683622:web:18398290da83ff9db30a67"
    };

    const GAS_URL = "https://script.google.com/macros/s/AKfycbzUREIji3lF-3500FlcYJLbuawBeNAcSaQFaF3lbUbW4DKUJ8LTdH0xX21G2gVIXXEO3w/exec"; 

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const { createApp, ref: vueRef, computed } = Vue;

    createApp({
        setup() {
            const user = vueRef(null);
            const uploading = vueRef(false);
            const skyPhotos = vueRef([]);
            const lifePhotos = vueRef([]);
            const answers = vueRef({ dailyQuestion: "", diary: "" });
            const showSettings = vueRef(false);

            // ⚠️ 設定研究開始日期 (GMT+8)
            const startDate = new Date(2026, 3, 20); // 2026-04-20

            // 實驗偏移天數 (存入 localStorage)
            const manualOffset = vueRef(parseInt(localStorage.getItem('exp_offset')) || 0);

            // 核心邏輯：計算台北時間的天數
            const currentDayNumber = computed(() => {
                // 1. 取得當下 UTC 時間
                const now = new Date();
                // 2. 轉換為台北時間 (UTC+8) 的毫秒數
                const taipeiTime = now.getTime() + (now.getTimezoneOffset() * 60000) + (8 * 3600000);
                const taipeiDate = new Date(taipeiTime);
                
                // 3. 計算日期差距
                const diffTime = taipeiDate - startDate;
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
                
                let result = diffDays + manualOffset.value;
                if (result < 1) return 1;
                return result > 7 ? 7 : result;
            });

            const questions = [
                "一個月會出國多少次？去多少種不同的國家？",
                "長期的不規律排班和跨時區時差，對日常帶來了哪些改變？通常如何調適？",
                "客艙工作環境中真的有階級文化嗎？有哪些新人必懂的潛規則？",
                "這份工作最無可取代的優點與最難以忍受的缺點分別為何？",
                "在與不同國籍的組員共事時，是否有特別的規定或不成文的默契需要遵守？",
                "經常需要在節假日排班或長期待在外站，這對維繫家庭關係、社交圈造成了什麼影響？",
                "隨意問答：今天有什麼特別想紀錄的事情嗎？"
            ];

            const currentQuestion = computed(() => questions[currentDayNumber.value - 1]);

            onAuthStateChanged(auth, (u) => { user.value = u; });

            const login = () => signInWithPopup(auth, provider);
            const logout = () => { signOut(auth); user.value = null; };

            const handleSkyPhotos = (e) => {
                Array.from(e.target.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (f) => skyPhotos.value.push(f.target.result);
                    reader.readAsDataURL(file);
                });
            };

            const handleLifePhotos = (e) => {
                Array.from(e.target.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (f) => lifePhotos.value.push(f.target.result);
                    reader.readAsDataURL(file);
                });
            };

            // 實驗室功能
            const setDay = (day) => {
                const now = new Date();
                const taipeiTime = now.getTime() + (now.getTimezoneOffset() * 60000) + (8 * 3600000);
                const taipeiDate = new Date(taipeiTime);
                const realDiffDays = Math.floor((taipeiDate - startDate) / (1000 * 60 * 60 * 24)) + 1;
                
                manualOffset.value = day - realDiffDays;
                localStorage.setItem('exp_offset', manualOffset.value);
            };

            const resetExperiment = () => {
                localStorage.clear();
                window.location.reload();
            };

            const submitAll = async () => {
                if (!user.value || skyPhotos.value.length === 0) return;
                uploading.value = true;
                const now = new Date();
                const taipeiDate = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (8 * 3600000));
                const dateLabel = taipeiDate.toLocaleDateString('zh-TW').replace(/\//g, '-');

                try {
                    await fetch(GAS_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({
                            userName: user.value.displayName,
                            date: dateLabel,
                            skyPhotos: skyPhotos.value,
                            lifePhotos: lifePhotos.value
                        })
                    });

                    await setDoc(doc(db, "probes", user.value.displayName, "daily_logs", `Day${currentDayNumber.value}_${dateLabel}`), {
                        dayNumber: currentDayNumber.value,
                        date: dateLabel,
                        question: currentQuestion.value,
                        answer: answers.value.dailyQuestion,
                        diary: answers.value.diary,
                        userName: user.value.displayName,
                        createdAt: serverTimestamp()
                    });

                    alert(`🎉 Day ${currentDayNumber.value} 提交成功！`);
                    answers.value = { dailyQuestion: "", diary: "" };
                    skyPhotos.value = [];
                    lifePhotos.value = [];
                } catch (e) {
                    alert("同步錯誤");
                } finally {
                    uploading.value = false;
                }
            };

            return { user, login, logout, currentQuestion, currentDayNumber, answers, handleSkyPhotos, handleLifePhotos, skyPhotos, lifePhotos, uploading, submitAll, showSettings, setDay, resetExperiment };
        }
    }).mount('#app');
</script>
</body>
</html>
