<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位文化探針日誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 font-sans">
    <div id="app" class="max-w-md mx-auto min-h-screen p-6 pb-20">
        
        <div v-if="!user" class="flex flex-col items-center justify-center h-[80vh] text-center">
            <div class="bg-white p-10 rounded-[2.5rem] card-shadow border border-slate-100">
                <div class="text-5xl mb-6">🛰️</div>
                <h1 class="text-3xl font-black mb-2 text-slate-900">數位探針日誌</h1>
                <p class="text-slate-400 mb-10 text-sm leading-relaxed">感謝參與這項研究<br>請使用 Google 帳號開始您的 7 日任務</p>
                <button @click="login" class="w-full bg-blue-600 hover:bg-blue-700 text-white px-8 py-4 rounded-2xl font-bold shadow-lg transition-all active:scale-95">
                    開始任務
                </button>
            </div>
        </div>

        <div v-else>
            <header class="flex justify-between items-end mb-8">
                <div>
                    <p class="text-[10px] font-black text-blue-600 uppercase tracking-widest mb-1">Cultural Probe Task</p>
                    <h2 class="text-2xl font-black text-slate-900 leading-none">{{ user.displayName }}</h2>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 mb-1">Day {{ currentDayNumber }} / 7</p>
                    <button @click="logout" class="text-[10px] text-red-400 font-bold hover:underline">登出</button>
                </div>
            </header>

            <main class="space-y-8">
                <section class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-black text-slate-800">☁️ 任務一：天空捕手</h3>
                        <span class="text-[10px] bg-red-100 text-red-500 px-2 py-1 rounded-full font-bold">必填</span>
                    </div>
                    <div class="relative group border-2 border-dashed border-slate-200 rounded-2xl p-4 text-center bg-slate-50 transition-all hover:bg-white hover:border-blue-300">
                        <input type="file" accept="image/*" @change="handleSkyPhoto" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" :disabled="uploading">
                        <div v-if="!skyPhoto" class="py-4">
                            <p class="text-sm font-bold text-slate-500">拍攝今日天空</p>
                            <p class="text-[10px] text-slate-300 mt-1">請記錄下您此時此刻上方的天空</p>
                        </div>
                        <img v-else :src="skyPhoto" class="mx-auto h-40 rounded-xl shadow-md object-cover">
                    </div>
                </section>

                <section class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100">
                    <div class="flex justify-between items-start mb-4">
                        <h3 class="font-black text-slate-800">📸 任務二：生活碎片</h3>
                        <span class="text-[10px] bg-slate-100 text-slate-400 px-2 py-1 rounded-full font-bold">選填</span>
                    </div>
                    <p class="text-[11px] text-slate-400 mb-4 leading-relaxed">工作上或私下的大小事，任何想分享的瞬間都歡迎上傳。</p>
                    <div class="grid grid-cols-3 gap-2">
                        <div v-for="(img, idx) in lifePhotos" :key="idx" class="relative aspect-square">
                            <img :src="img" class="w-full h-full object-cover rounded-lg">
                            <button @click="lifePhotos.splice(idx, 1)" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-4 h-4 text-[10px]">×</button>
                        </div>
                        <div class="relative aspect-square border-2 border-dashed border-slate-200 rounded-lg flex items-center justify-center bg-slate-50 hover:bg-slate-100">
                            <input type="file" accept="image/*" multiple @change="handleLifePhotos" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                            <span class="text-xl text-slate-300">+</span>
                        </div>
                    </div>
                </section>

                <section class="bg-blue-600 p-8 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full blur-3xl"></div>
                    <h3 class="text-xs font-black opacity-60 mb-4 tracking-widest uppercase">Daily Insight</h3>
                    <p class="text-xl font-bold leading-tight mb-8">{{ currentQuestion }}</p>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="text-[10px] font-bold opacity-60 mb-2 block">您的回答</label>
                            <textarea v-model="answers.dailyQuestion" class="w-full rounded-2xl p-4 text-sm bg-white/10 border border-white/20 text-white placeholder:text-white/30 focus:bg-white focus:text-slate-800 transition-all outline-none" rows="3" placeholder="在這裡書寫..."></textarea>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold opacity-60 mb-2 block">今日小日記</label>
                            <textarea v-model="answers.diary" class="w-full rounded-2xl p-4 text-sm bg-white/10 border border-white/20 text-white placeholder:text-white/30 focus:bg-white focus:text-slate-800 transition-all outline-none" rows="3" placeholder="今天還有什麼想紀錄的嗎？"></textarea>
                        </div>
                    </div>
                    
                    <button @click="submitAll" :disabled="uploading || !skyPhoto" class="mt-10 w-full bg-white text-blue-600 py-4 rounded-2xl font-black shadow-xl transition-all active:scale-95 disabled:bg-blue-300 disabled:text-blue-100">
                        {{ uploading ? '資料同步中...' : '提交今日紀錄' }}
                    </button>
                </section>
            </main>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMHC3xDC0dDXdw8i31v-TT3wUvoddXQgs",
      authDomain: "culture-probe-toolkit.firebaseapp.com",
      projectId: "culture-probe-toolkit",
      storageBucket: "culture-probe-toolkit.firebasestorage.app",
      messagingSenderId: "918153683622",
      appId: "1:918153683622:web:18398290da83ff9db30a67"
    };

    const GAS_URL = "https://script.google.com/macros/s/AKfycbzUREIji3lF-3500FlcYJLbuawBeNAcSaQFaF3lbUbW4DKUJ8LTdH0xX21G2gVIXXEO3w/exec"; 

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const { createApp, ref: vueRef, computed } = Vue;

    createApp({
        setup() {
            const user = vueRef(null);
            const uploading = vueRef(false);
            const skyPhoto = vueRef("");
            const lifePhotos = vueRef([]);
            const answers = vueRef({ dailyQuestion: "", diary: "" });

            const questions = [
                "一個月會出國多少次？去多少種不同的國家？", // Day 1
                "長期的不規律排班和跨時區時差，對日常帶來了哪些改變？通常如何調適？",
                "客艙工作環境中真的有階級文化嗎？有哪些新人必懂的潛規則？",
                "這份工作最無可取代的優點與最難以忍受的缺點分別為何？",
                "在與不同國籍的組員共事時，是否有特別的規定或不成文的默契需要遵守？",
                "經常需要在節假日排班或長期待在外站，這對維繫家庭關係、社交圈造成了什麼影響？",
                "隨意問答：今天有什麼特別想紀錄的事情嗎？" // Day 7
            ];

            const currentDayNumber = vueRef(1); 
            const currentQuestion = computed(() => questions[currentDayNumber.value - 1]);

            onAuthStateChanged(auth, (u) => { user.value = u; });

            const login = () => signInWithPopup(auth, provider);
            const logout = () => { signOut(auth); user.value = null; };

            const handleSkyPhoto = (e) => {
                const reader = new FileReader();
                reader.onload = (f) => skyPhoto.value = f.target.result;
                reader.readAsDataURL(e.target.files[0]);
            };

            const handleLifePhotos = (e) => {
                Array.from(e.target.files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (f) => lifePhotos.value.push(f.target.result);
                    reader.readAsDataURL(file);
                });
            };

            const submitAll = async () => {
                if (!user.value || !skyPhoto.value) return;
                uploading.value = true;
                const timestamp = new Date().toLocaleDateString('zh-TW').replace(/\//g, '-');

                try {
                    // 1. 傳送照片到 Drive (GAS)
                    await fetch(GAS_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({
                            userName: user.value.displayName,
                            date: timestamp,
                            skyPhoto: skyPhoto.value,
                            lifePhotos: lifePhotos.value
                        })
                    });

                    // 2. 存入 Firestore (依使用者姓名建立子路徑，方便整理)
                    // 路徑改為: probes / 使用者名稱 / 日期
                    await setDoc(doc(db, "probes", user.value.displayName, "daily_logs", timestamp), {
                        date: timestamp,
                        question: currentQuestion.value,
                        answer: answers.value.dailyQuestion,
                        diary: answers.value.diary,
                        dayNumber: currentDayNumber.value,
                        createdAt: serverTimestamp()
                    });

                    alert("🎉 今日任務已同步完成！感謝分享。");
                    answers.value.dailyQuestion = "";
                    answers.value.diary = "";
                    skyPhoto.value = "";
                    lifePhotos.value = [];
                } catch (e) {
                    alert("儲存失敗，請檢查網路。");
                } finally {
                    uploading.value = false;
                }
            };

            return { user, login, logout, currentQuestion, currentDayNumber, answers, handleSkyPhoto, handleLifePhotos, skyPhoto, lifePhotos, uploading, submitAll };
        }
    }).mount('#app');
</script>
</body>
</html>
