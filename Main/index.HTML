<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數位文化探針日誌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05); }
        .no-select { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        .required-tag { font-size: 9px; color: #94a3b8; font-weight: bold; border: 1px solid #f1f5f9; padding: 1px 4px; border-radius: 4px; }
        .done-tag { font-size: 9px; color: #10b981; background: #ecfdf5; padding: 1px 6px; border-radius: 4px; font-weight: bold; }
        .dark .required-tag { color: #64748b; border-color: #334155; }
        .tips-btn { font-size: 10px; color: #3b82f6; background: #eff6ff; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .fade-enter-active, .fade-leave-active { transition: opacity 0.5s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }
        @keyframes bounce-in { 0% { transform: scale(0.9); opacity: 0; } 70% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
        .animate-bounce-in { animation: bounce-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body class="transition-colors duration-300">
    <div id="app" class="min-h-screen bg-[#F8FAFC] dark:bg-[#0F172A] text-slate-800 dark:text-slate-200 no-select font-sans">
        <div class="max-w-md mx-auto p-6 pb-24">
            
            <div v-if="!user" class="flex flex-col items-center justify-center h-[80vh] text-center">
                <div class="bg-white dark:bg-slate-800 p-10 rounded-[2.5rem] card-shadow border border-slate-100 dark:border-slate-700">
                    <div class="text-5xl mb-6 text-slate-900 dark:text-white">🛰️</div>
                    <h1 class="text-3xl font-black mb-2 tracking-tight text-slate-900 dark:text-white">數位探針日誌</h1>
                    <p class="text-slate-400 mb-10 text-sm">請使用 Google 帳號開始 7 日任務</p>
                    <button @click="login" class="w-full bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">進入系統</button>
                </div>
            </div>

            <div v-else>
                <header class="flex justify-between items-start mb-8">
                    <div>
                        <h2 @mousedown="startLongPress" @mouseup="endLongPress" @touchstart="startLongPress" @touchend="endLongPress" class="text-2xl font-black text-slate-900 dark:text-white leading-none mb-2">
                            {{ user.displayName }}
                        </h2>
                        <div class="flex items-center gap-2">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tight">Taipei Time</span>
                            <span class="text-[10px] font-black text-blue-500">{{ currentTime }}</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-3">
                        <button @click="toggleTheme" class="w-10 h-10 flex items-center justify-center bg-white dark:bg-slate-800 rounded-full shadow-sm border border-slate-100 dark:border-slate-700 text-lg">
                            {{ isDark ? '🌙' : '☀️' }}
                        </button>
                        <div class="flex flex-col items-end gap-1">
                            <span class="inline-block bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase">Day {{ currentDayNumber }}</span>
                            <span v-if="isTodayCompleted" class="done-tag">今日已紀錄完成</span>
                        </div>
                    </div>
                </header>

                <main v-if="loadingProgress" class="flex flex-col items-center justify-center py-20 text-center">
                    <div class="animate-spin text-3xl mb-4 text-blue-500">⌛</div>
                    <p class="text-xs text-slate-400 font-bold uppercase tracking-widest">同步進度中...</p>
                </main>

                <main v-else class="space-y-6">
                    <section class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] card-shadow border border-slate-50 dark:border-slate-700">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-2">
                                <h3 class="font-black text-slate-800 dark:text-slate-100 text-sm">☁️ 任務一：天空捕手</h3>
                                <button @click="showTips('sky')" class="tips-btn">?</button>
                            </div>
                            <span v-if="isTodayCompleted" class="done-tag">已完成</span>
                            <span v-else class="required-tag">必填</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2 mt-4">
                            <div v-for="(img, idx) in skyPhotos" :key="idx" class="relative aspect-square">
                                <img :src="img" class="w-full h-full object-cover rounded-xl shadow-inner">
                                <button @click="skyPhotos.splice(idx, 1)" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center shadow-md">×</button>
                            </div>
                            <div class="relative aspect-square border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl flex items-center justify-center bg-slate-50 dark:bg-slate-900">
                                <input type="file" accept="image/*" multiple @change="handleSkyPhotos" class="absolute inset-0 opacity-0 cursor-pointer">
                                <span class="text-2xl text-slate-300 dark:text-slate-600">+</span>
                            </div>
                        </div>
                    </section>

                    <section class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] card-shadow border border-slate-50 dark:border-slate-700">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-2">
                                <h3 class="font-black text-slate-800 dark:text-slate-100 text-sm">📸 任務二：今日生活碎片</h3>
                                <button @click="showTips('life')" class="tips-btn">?</button>
                            </div>
                            <span v-if="isTodayCompleted" class="done-tag">已完成</span>
                            <span v-else class="required-tag">必填</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2 mt-4">
                            <div v-for="(img, idx) in lifePhotos" :key="idx" class="relative aspect-square">
                                <img :src="img" class="w-full h-full object-cover rounded-xl shadow-inner">
                                <button @click="lifePhotos.splice(idx, 1)" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full w-5 h-5 text-xs flex items-center justify-center shadow-md">×</button>
                            </div>
                            <div class="relative aspect-square border-2 border-dashed border-slate-200 dark:border-slate-700 rounded-xl flex items-center justify-center bg-slate-50 dark:bg-slate-900">
                                <input type="file" accept="image/*" multiple @change="handleLifePhotos" class="absolute inset-0 opacity-0 cursor-pointer">
                                <span class="text-2xl text-slate-300 dark:text-slate-600">+</span>
                            </div>
                        </div>
                    </section>

                    <template v-if="!isTodayCompleted">
                        <section class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] card-shadow border border-slate-50 dark:border-slate-700">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-black text-slate-800 dark:text-slate-100 text-sm">💡 任務三：每日提問</h3>
                                <span class="required-tag">必填</span>
                            </div>
                            <p class="text-sm font-bold text-blue-600 dark:text-blue-400 mb-4">{{ currentQuestion }}</p>
                            <textarea v-model="answers.dailyQuestion" class="w-full rounded-2xl p-4 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-100 dark:border-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all dark:text-white" rows="4" placeholder="分享您的看法..."></textarea>
                        </section>

                        <section class="bg-blue-600 dark:bg-blue-700 p-8 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
                            <div class="absolute -top-12 -right-12 w-40 h-40 bg-white/10 rounded-full blur-3xl"></div>
                            <h3 class="font-black text-sm uppercase tracking-widest opacity-80 mb-6">Final Task: Diary</h3>
                            <textarea v-model="answers.diary" class="w-full rounded-2xl p-4 text-sm bg-white/10 border border-white/20 text-white placeholder:text-white/30 focus:bg-white focus:text-slate-800 outline-none transition-all" rows="4" placeholder="今日的感觸是..."></textarea>
                            
                            <button @click="submitAll" :disabled="uploading || !isFormValid" class="mt-10 w-full bg-white text-blue-600 py-4 rounded-2xl font-black shadow-xl active:scale-95 disabled:bg-blue-300 transition-all">
                                {{ uploading ? '同步中...' : '提交紀錄' }}
                            </button>
                        </section>
                    </template>

                    <div v-else class="text-center py-4">
                        <p class="text-[10px] text-slate-400 mb-4 tracking-wider uppercase font-bold">您可以繼續追加今日的照片紀錄</p>
                        <button @click="submitAll" :disabled="uploading || (skyPhotos.length === 0 && lifePhotos.length === 0)" class="w-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 py-4 rounded-2xl font-black active:scale-95 disabled:opacity-50 transition-all">
                            {{ uploading ? '正在上傳追加內容...' : '提交追加照片' }}
                        </button>
                        <button @click="logout" class="mt-8 text-[10px] text-slate-400 font-bold hover:text-red-400">登出帳號</button>
                    </div>
                </main>

                <transition name="fade">
                    <div v-if="showSuccessCard" class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-6 backdrop-blur-md">
                        <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[3rem] overflow-hidden card-shadow animate-bounce-in text-center">
                            <img :src="`image/${successImage}`" class="w-full h-64 object-cover">
                            <div class="p-8">
                                <h3 class="text-2xl font-black text-slate-900 dark:text-white mb-2">同步完成</h3>
                                <p class="text-slate-500 dark:text-slate-400 text-sm mb-8">感謝您額外的分享，紀錄已更新。</p>
                                <button @click="closeSuccessCard" class="w-full py-4 bg-blue-600 text-white rounded-2xl font-black">關閉</button>
                            </div>
                        </div>
                    </transition>

                </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDocs, collection, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMHC3xDC0dDXdw8i31v-TT3wUvoddXQgs",
      authDomain: "culture-probe-toolkit.firebaseapp.com",
      projectId: "culture-probe-toolkit",
      storageBucket: "culture-probe-toolkit.firebasestorage.app",
      messagingSenderId: "918153683622",
      appId: "1:918153683622:web:18398290da83ff9db30a67"
    };

    const GAS_URL = "https://script.google.com/macros/s/AKfycbzUREIji3lF-3500FlcYJLbuawBeNAcSaQFaF3lbUbW4DKUJ8LTdH0xX21G2gVIXXEO3w/exec"; 

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const { createApp, ref: vueRef, computed, onMounted, watch } = Vue;

    createApp({
        setup() {
            const user = vueRef(null);
            const isDark = vueRef(localStorage.getItem('theme') === 'dark');
            const uploading = vueRef(false);
            const loadingProgress = vueRef(false);
            const dbDayNumber = vueRef(1);
            const isTodayCompleted = vueRef(false); // 💡 新增：今日是否完成狀態
            
            const skyPhotos = vueRef([]);
            const lifePhotos = vueRef([]);
            const answers = vueRef({ dailyQuestion: "", diary: "" });
            const showSettings = vueRef(false);
            const showSuccessCard = vueRef(false);
            const successImage = vueRef("01.png");
            const currentTime = vueRef("");
            const pressTimer = vueRef(null);
            const startDate = new Date(2026, 3, 20); 
            const manualOffset = vueRef(parseInt(localStorage.getItem('exp_offset')) || 0);

            const applyTheme = (dark) => {
                if (dark) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            };

            const toggleTheme = () => {
                isDark.value = !isDark.value;
                localStorage.setItem('theme', isDark.value ? 'dark' : 'light');
                applyTheme(isDark.value);
            };

            // 💡 核心邏輯：熱更新且判斷今日是否已完成
            watch(user, async (newVal) => {
                if (newVal) {
                    loadingProgress.value = true;
                    try {
                        const q = query(collection(db, "probes", newVal.displayName, "daily_logs"), orderBy("createdAt", "desc"), limit(1));
                        const querySnapshot = await getDocs(q);
                        
                        const now = new Date();
                        const todayLabel = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (8 * 3600000)).toLocaleDateString('zh-TW').replace(/\//g, '-');

                        if (!querySnapshot.empty) {
                            const lastDoc = querySnapshot.docs[0].data();
                            if (lastDoc.date === todayLabel) {
                                // 今天已填過
                                dbDayNumber.value = lastDoc.dayNumber;
                                isTodayCompleted.value = true;
                            } else {
                                // 今天還沒填，進度 +1
                                dbDayNumber.value = lastDoc.dayNumber + 1;
                                isTodayCompleted.value = false;
                            }
                        } else {
                            dbDayNumber.value = 1;
                        }
                    } catch (e) { console.error(e); }
                    loadingProgress.value = false;
                }
            });

            const currentDayNumber = computed(() => {
                let day = dbDayNumber.value + manualOffset.value;
                return day > 7 ? 7 : day;
            });

            // 💡 驗證邏輯：若是今日已完成，只需檢查照片；若沒完成，則全必填
            const isFormValid = computed(() => {
                if (isTodayCompleted.value) {
                    return skyPhotos.value.length > 0 || lifePhotos.value.length > 0;
                }
                return skyPhotos.value.length > 0 && lifePhotos.value.length > 0 && 
                       answers.value.dailyQuestion.trim() !== "" && answers.value.diary.trim() !== "";
            });

            const questions = ["一個月會出國多少次？去多少種不同的國家？", "長期的不規律排班和跨時區時差，對日常帶來了哪些改變？通常如何調適？", "客艙工作環境中真的有階級文化嗎？有哪些新人必懂的潛規則？", "這份工作最無可取代的優點與最難以忍受的缺點分別為何？", "在與不同國籍的組員共事時，是否有特別的規定或不成文的默契需要遵守？", "經常需要在節假日排班或長期待在外站，這對維繫家庭關係、社交圈造成了什麼影響？", "隨意問答：今天有什麼特別想紀錄的事情嗎？"];
            const currentQuestion = computed(() => questions[currentDayNumber.value - 1]);

            const submitAll = async () => {
                if (!isFormValid.value) return;
                uploading.value = true;
                const now = new Date();
                const taipeiTime = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (8 * 3600000));
                const dateLabel = taipeiTime.toLocaleDateString('zh-TW').replace(/\//g, '-');

                try {
                    // 呼叫 GAS 傳照片
                    await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ userName: user.value.displayName, date: dateLabel, skyPhotos: skyPhotos.value, lifePhotos: lifePhotos.value }) });
                    
                    // 同步 Firestore 文字
                    await setDoc(doc(db, "probes", user.value.displayName, "daily_logs", `Day${currentDayNumber.value}_${dateLabel}`), {
                        dayNumber: currentDayNumber.value, date: dateLabel, question: currentQuestion.value,
                        answer: answers.value.dailyQuestion, diary: answers.value.diary,
                        userName: user.value.displayName, createdAt: serverTimestamp()
                    }, { merge: true }); // 使用 merge 模式，避免覆蓋掉當天先前的紀錄

                    isTodayCompleted.value = true;
                    showSuccessCard.value = true;
                    answers.value = { dailyQuestion: "", diary: "" };
                    skyPhotos.value = []; lifePhotos.value = [];
                } catch (e) { alert("同步失敗"); } finally { uploading.value = false; }
            };

            onMounted(() => {
                applyTheme(isDark.value);
                setInterval(() => {
                    const now = new Date();
                    const d = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (8 * 3600000));
                    currentTime.value = `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}:${d.getSeconds().toString().padStart(2, '0')}`;
                }, 1000);
            });

            onAuthStateChanged(auth, (u) => { user.value = u; });
            const login = () => signInWithPopup(auth, provider);
            const closeSuccessCard = () => showSuccessCard.value = false;
            const handleSkyPhotos = (e) => { Array.from(e.target.files).forEach(file => { const reader = new FileReader(); reader.onload = (f) => skyPhotos.value.push(f.target.result); reader.readAsDataURL(file); }); };
            const handleLifePhotos = (e) => { Array.from(e.target.files).forEach(file => { const reader = new FileReader(); reader.onload = (f) => lifePhotos.value.push(f.target.result); reader.readAsDataURL(file); }); };
            const startLongPress = () => pressTimer.value = setTimeout(() => showSettings.value = true, 3000);
            const endLongPress = () => clearTimeout(pressTimer.value);
            const setDay = (d) => { manualOffset.value = d - dbDayNumber.value; localStorage.setItem('exp_offset', manualOffset.value); };
            const resetExperiment = () => { localStorage.clear(); window.location.reload(); };

            return { user, login, currentQuestion, currentDayNumber, answers, handleSkyPhotos, handleLifePhotos, skyPhotos, lifePhotos, uploading, submitAll, showSettings, setDay, resetExperiment, startLongPress, endLongPress, currentTime, isFormValid, showSuccessCard, successImage: "01.png", closeSuccessCard, loadingProgress, isDark, toggleTheme, isTodayCompleted };
        }
    }).mount('#app');
</script>
</body>
</html>
